<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — simd</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #fff;
    color: #000;
    display: flex; align-items: center; justify-content: center;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .card {
    width: 340px;
    max-width: 88vw;
  }
  .card h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.2px;
    margin-bottom: 2px;
  }
  .card .sub {
    font-size: 13px;
    color: #555;
    margin-bottom: 28px;
    line-height: 1.4;
  }
  .field {
    margin-bottom: 14px;
  }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #333;
    margin-bottom: 5px;
  }
  .field input {
    width: 100%;
    padding: 9px 10px;
    font-size: 14px;
    font-family: inherit;
    border: 1px solid #ccc;
    border-radius: 0;
    outline: none;
    background: #fff;
    color: #000;
    transition: border-color 0.15s;
  }
  .field input:focus {
    border-color: #000;
    box-shadow: 0 0 0 1px #000;
  }
  button {
    width: 100%;
    padding: 10px 0;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: 0.4px;
    background: #000;
    color: #fff;
    border: 1px solid #000;
    cursor: pointer;
    margin-top: 6px;
  }
  button:hover { background: #222; border-color: #222; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .msg {
    font-size: 12px;
    margin-top: 12px;
    display: none;
    line-height: 1.4;
  }
  .msg.error { color: #000; display: none; }
</style>
</head>
<body>
<div class="card">
  <h1>simd</h1>
  <p class="sub">Sign in to access your documents.</p>
  <div class="field">
    <label for="user">Username</label>
    <input type="text" id="user" autocomplete="username" required autofocus>
  </div>
  <div class="field">
    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password" required>
  </div>
  <button id="btn" onclick="doLogin()">Sign In</button>
  <div id="msg" class="msg error"></div>
</div>
<script>
  async function doLogin() {
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');
    msg.style.display = 'none';

    const user = document.getElementById('user').value.trim();
    const password = document.getElementById('password').value;

    if (!user || !password) {
      msg.textContent = 'Both fields are required.';
      msg.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user, password })
      });
      const data = await res.json();
      if (data.ok) {
        window.location.href = '/';
      } else {
        msg.textContent = data.error || 'Invalid credentials.';
        msg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    } catch (e) {
      msg.textContent = 'Connection error.';
      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
